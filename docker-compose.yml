name: browser-poc

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BROWSER_NETWORK=cloak_net
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cloak_net

networks:
  cloak_net:
    name: cloak_net
